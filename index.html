<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>全商 財務諸表分析｜公式クリック練習（自動判定・ミス管理）</title>
  <style>
    :root{
      --bg:#0b1020; --card:#111a33; --text:#eef2ff; --muted:#a6b0d6;
      --good:#22c55e; --bad:#ef4444; --btn:#263a77; --btn2:#1b2a55;
      --warn:#f59e0b; --radius:16px;
    }
    body{ margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:1100px; margin:0 auto; padding:18px; }
    .card{ background:var(--card); border-radius:var(--radius); padding:16px; margin:12px 0; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .muted{ color:var(--muted); }
    h2{ margin:6px 0 0; }
    select{
      background:#0f1730; color:var(--text);
      border:1px solid rgba(238,242,255,.15);
      border-radius:12px; padding:10px 12px;
    }
    button{
      border:0; border-radius:12px; padding:10px 12px;
      background:var(--btn); color:var(--text); cursor:pointer; font-weight:800;
    }
    button:hover{ filter:brightness(1.08); }
    .btn2{ background:var(--btn2); }
    .btnDanger{ background:#7a2430; }
    .btnOk{ background:#1c6b3c; }
    .btnGhost{
      background:transparent;
      border:1px solid rgba(238,242,255,.18);
    }
    .expr{
      min-height:52px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
      border:1px dashed rgba(166,176,214,.35); border-radius:14px; padding:10px 12px;
    }
    .chip{
      background:#0f1730; border:1px solid rgba(238,242,255,.15);
      padding:8px 10px; border-radius:12px;
      user-select:none;
    }
    .op{ background:#1a244a; }
    .status{ font-weight:900; }
    .grid{ display:grid; grid-template-columns: 1fr; gap:12px; }
    @media(min-width:980px){ .grid{ grid-template-columns: 1.4fr 1fr; } }
    .btnWrap{ display:flex; gap:8px; flex-wrap:wrap; }
    .small{ font-size:12px; }
    .list{
      display:flex; flex-direction:column; gap:8px;
      max-height:340px; overflow:auto; padding-right:4px;
    }
    .listItem{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(238,242,255,.12);
      background:#0f1730;
    }
    .badge{
      padding:4px 8px; border-radius:999px;
      background:rgba(239,68,68,.18);
      border:1px solid rgba(239,68,68,.35);
      color:#ffb4b4; font-weight:900; font-size:12px;
    }
    .cat{
      padding:4px 8px; border-radius:999px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.25);
      color:#b9ffd4; font-weight:900; font-size:12px;
    }
    .cat.safe{ background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.25); color:#cfe3ff; }
    .cat.grow{ background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.25); color:#ffe3b3; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="toolbar">
      <div>
        <div class="muted">出題中の指標</div>
        <h2 id="qName">-</h2>
        <div class="muted small" id="qMeta">-</div>
      </div>

      <div class="row">
        <div class="muted">出題</div>
        <select id="pool">
          <option value="all">全問題（ランダム）</option>
          <option value="mistakes">ミス問題のみ（ランダム）</option>
          <option value="sequential">全問題（順番）</option>
        </select>

        <button id="next" class="btn2">スキップ</button>
      </div>
    </div>

    <div style="margin-top:12px" class="muted">
      クリックで式を組み立て（式が“完成”した瞬間に<strong>自動採点</strong>）
    </div>

    <div id="expr" class="expr" aria-live="polite"></div>

    <div class="row" style="margin-top:10px">
      <button id="undo" class="btn2">ひとつ戻す</button>
      <button id="clear" class="btnDanger">クリア</button>
      <button id="showAns" class="btnGhost">答え表示</button>
      <span style="flex:1"></span>
      <div class="muted">正答率：<span id="acc">-</span>（<span id="score">0/0</span>）</div>
    </div>

    <div style="margin-top:10px">
      <div id="msg" class="status"></div>
      <div id="hint" class="muted" style="margin-top:6px"></div>
    </div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="muted" style="margin-bottom:8px">演算子</div>
      <div id="ops" class="btnWrap"></div>

      <div class="muted" style="margin:14px 0 8px">項目（全商：財務諸表分析で使う範囲に限定）</div>
      <div id="items" class="btnWrap"></div>

      <div class="muted small" style="margin-top:10px">
        ※「常に全項目」なので、指標ごとに項目が絞られず“識別”が鍛えられます。
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div>
          <div class="muted">ミス問題リスト</div>
          <div class="muted small">間違えた回数が自動で記録されます</div>
        </div>
        <button id="resetMistakes" class="btn2">ミス履歴リセット</button>
      </div>

      <div style="margin-top:10px" class="list" id="mistakeList"></div>
      <div class="muted small" style="margin-top:10px">
        「ミス問題のみ」に切り替えると、ここに入っている指標だけを回せます。
      </div>
    </div>

  </div>

</div>

<script>
(() => {
  // =========================
  // 1) 固定ボタン（全商の財務諸表分析で使う範囲に限定）
  //    ※キャッシュフロー項目は削除
  // =========================
  const ALL_ITEMS = [
    // BS系
    "流動資産","当座資産","棚卸資産","固定資産","総資産",
    "流動負債","固定負債","負債","純資産","自己資本","株主資本",
    // PL系
    "売上高","総収益","売上原価","売上総利益",
    "販売費及び一般管理費","営業利益","経常利益","当期純利益"
  ];

  // 演算子（式組み立て用）
  const OPS = ["＋","－","×","÷","（","）","×100"];

  // =========================
  // 2) 問題（収益性・安全性・成長性）
  //    ※キャッシュフロー指標は削除
  //    ※●●回転率を追加（代表例）
  // =========================
  const QUESTIONS = [
    // ---------- 収益性 ----------
    { cat:"収益性", name:"経常収益経常利益率", tokens:["経常利益","÷","総収益","×100"], hint:"企業の全体的なもうけの割合（経常利益÷総収益）×100" },
    { cat:"収益性", name:"総資産当期純利益率（ROA）", tokens:["当期純利益","÷","総資産","×100"], hint:"総資産でどれだけ純利益を生んだか（当期純利益÷総資産）×100" },
    { cat:"収益性", name:"総資産経常利益率", tokens:["経常利益","÷","総資産","×100"], hint:"総資産でどれだけ経常利益を生んだか（経常利益÷総資産）×100" },
    { cat:"収益性", name:"営業資産営業利益率", tokens:["営業利益","÷","（","総資産","－","固定資産","）","×100"], hint:"営業資産＝総資産－（投資その他等）…を授業定義に合わせて調整可" },
    { cat:"収益性", name:"使用資産経常利益率", tokens:["経常利益","÷","総資産","×100"], hint:"（使用資産の定義は試験注意に合わせて調整可。まずは基本形で）" },

    { cat:"収益性", name:"売上高売上総利益率（粗利率）", tokens:["売上総利益","÷","売上高","×100"], hint:"粗利率（売上総利益÷売上高）×100" },
    { cat:"収益性", name:"売上高営業利益率", tokens:["営業利益","÷","売上高","×100"], hint:"本業のもうけ（営業利益÷売上高）×100" },
    { cat:"収益性", name:"売上高純利益率（売上高当期純利益率）", tokens:["当期純利益","÷","売上高","×100"], hint:"最終利益の割合（当期純利益÷売上高）×100" },
    { cat:"収益性", name:"売上高販売費及び一般管理費率", tokens:["販売費及び一般管理費","÷","売上高","×100"], hint:"販管費の重さ（販管費÷売上高）×100" },
    { cat:"収益性", name:"売上高売上原価率", tokens:["売上原価","÷","売上高","×100"], hint:"原価の重さ（売上原価÷売上高）×100" },

    { cat:"収益性", name:"自己資本利益率（ROE）", tokens:["当期純利益","÷","自己資本","×100"], hint:"自己資本でどれだけ純利益を生んだか（当期純利益÷自己資本）×100" },

    // ★追加：●●回転率（効率性系）
    // ※カテゴリ表示ロジックは変更しないため cat は「収益性」のままにしています（仕様変更回避）
    { cat:"収益性", name:"総資産回転率", tokens:["売上高","÷","総資産"], hint:"資産を使ってどれだけ売上を生んだか（売上高÷総資産）" },
    { cat:"収益性", name:"棚卸資産回転率", tokens:["売上原価","÷","棚卸資産"], hint:"在庫の回り方（売上原価÷棚卸資産）" },
    { cat:"収益性", name:"自己資本回転率", tokens:["売上高","÷","自己資本"], hint:"自己資本を使ってどれだけ売上を生んだか（売上高÷自己資本）" },

    // ---------- 安全性 ----------
    { cat:"安全性", name:"流動比率", tokens:["流動資産","÷","流動負債","×100"], hint:"短期の支払能力（流動資産÷流動負債）×100" },
    { cat:"安全性", name:"当座比率", tokens:["当座資産","÷","流動負債","×100"], hint:"より厳格な短期支払能力（当座資産÷流動負債）×100" },
    { cat:"安全性", name:"自己資本比率", tokens:["自己資本","÷","総資産","×100"], hint:"財務体質（自己資本÷総資産）×100" },
    { cat:"安全性", name:"総資産負債比率", tokens:["総資産","÷","負債","×100"], hint:"他人資本に対する資産規模（総資産÷負債）×100" },
    { cat:"安全性", name:"純資産負債比率", tokens:["純資産","÷","負債","×100"], hint:"長期的安全性（純資産÷負債）×100" },
    { cat:"安全性", name:"固定比率", tokens:["固定資産","÷","自己資本","×100"], hint:"固定資産を自己資本で賄えているか（固定資産÷自己資本）×100" },
    { cat:"安全性", name:"固定長期適合率", tokens:["固定資産","÷","（","自己資本","＋","固定負債","）","×100"], hint:"固定資産を長期資金で賄えているか（固定資産÷（自己資本＋固定負債））×100" },

    // ---------- 成長性 ----------
    { cat:"成長性", name:"売上高成長率（増収率）", tokens:["（","売上高","－","売上高","）","÷","売上高","×100"], hint:"当期と前期の売上高で計算（※この式は“当期−前期”の2つの売上高を使う前提）" },
    { cat:"成長性", name:"総資本増加率（総資産成長率）", tokens:["（","総資産","－","総資産","）","÷","総資産","×100"], hint:"当期と前期の総資産で計算（※この式は“当期−前期”の2つの総資産を使う前提）" },
    { cat:"成長性", name:"営業利益成長率（対前年比）", tokens:["（","営業利益","－","営業利益","）","÷","営業利益","×100"], hint:"当期と前期の営業利益で計算（対前年比の考え方）" },
  ];

  // =========================
  // 3) 状態
  // =========================
  const state = {
    idx: 0,
    tokens: [],
    tries: 0,
    correct: 0,
    mistakeCountByName: new Map(), // name -> count
    lastAutoJudgedAt: 0
  };

  // =========================
  // 4) DOM
  // =========================
  const qNameEl = document.getElementById("qName");
  const qMetaEl = document.getElementById("qMeta");
  const exprEl  = document.getElementById("expr");
  const msgEl   = document.getElementById("msg");
  const hintEl  = document.getElementById("hint");
  const accEl   = document.getElementById("acc");
  const scoreEl = document.getElementById("score");
  const poolEl  = document.getElementById("pool");

  const opsWrap   = document.getElementById("ops");
  const itemsWrap = document.getElementById("items");
  const mistakeListEl = document.getElementById("mistakeList");

  const undoBtn = document.getElementById("undo");
  const clearBtn= document.getElementById("clear");
  const nextBtn = document.getElementById("next");
  const showAnsBtn = document.getElementById("showAns");
  const resetMistakesBtn = document.getElementById("resetMistakes");

  // =========================
  // 5) UI生成
  // =========================
  function makeButton(token){
    const b = document.createElement("button");
    b.textContent = token;
    b.dataset.token = token;
    b.addEventListener("click", () => onToken(token));
    return b;
  }
  OPS.forEach(op => opsWrap.appendChild(makeButton(op)));
  ALL_ITEMS.forEach(item => itemsWrap.appendChild(makeButton(item)));

  // =========================
  // 6) 表示系
  // =========================
  function catClass(cat){
    if(cat==="安全性") return "cat safe";
    if(cat==="成長性") return "cat grow";
    return "cat";
  }

  function renderQuestion(){
    const q = QUESTIONS[state.idx];
    qNameEl.textContent = q.name;
    qMetaEl.innerHTML = `<span class="${catClass(q.cat)}">${q.cat}</span> <span class="muted">｜自動判定ON｜ミス管理ON</span>`;
    clearExpr(false);
    setMessage("");
    hintEl.textContent = "";
    renderExpr();
  }

  function renderExpr(){
    exprEl.innerHTML = "";
    if(state.tokens.length === 0){
      exprEl.innerHTML = `<span class="muted">ここに式が表示されます</span>`;
      return;
    }
    state.tokens.forEach(t => {
      const div = document.createElement("div");
      div.className = "chip" + (OPS.includes(t) ? " op" : "");
      div.textContent = t;
      exprEl.appendChild(div);
    });
  }

  function setMessage(text, kind=null){
    msgEl.textContent = text || "";
    if(kind==="good") msgEl.style.color = "#9dffc4";
    else if(kind==="bad") msgEl.style.color = "#ffb4b4";
    else if(kind==="warn") msgEl.style.color = "#ffe3b3";
    else msgEl.style.color = "#eef2ff";
  }

  function updateScore(){
    scoreEl.textContent = `${state.correct}/${state.tries}`;
    if(state.tries === 0) accEl.textContent = "-";
    else accEl.textContent = Math.round((state.correct/state.tries)*100) + "%";
  }

  function renderMistakeList(){
    const entries = [...state.mistakeCountByName.entries()]
      .sort((a,b)=> b[1]-a[1]);

    if(entries.length === 0){
      mistakeListEl.innerHTML = `<div class="muted small">まだミスはありません。</div>`;
      return;
    }

    mistakeListEl.innerHTML = "";
    for(const [name,count] of entries){
      const q = QUESTIONS.find(x => x.name === name);
      const row = document.createElement("div");
      row.className = "listItem";

      const left = document.createElement("div");
      left.style.display = "flex";
      left.style.flexDirection = "column";
      left.style.gap = "2px";
      left.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <span class="${catClass(q?.cat || "収益性")}">${q?.cat || "収益性"}</span>
          <strong>${name}</strong>
        </div>
        <div class="muted small">クリックでこの問題に移動</div>
      `;

      const right = document.createElement("div");
      right.innerHTML = `<span class="badge">ミス ${count}</span>`;

      row.appendChild(left);
      row.appendChild(right);

      row.addEventListener("click", () => {
        const idx = QUESTIONS.findIndex(x => x.name === name);
        if(idx >= 0){
          state.idx = idx;
          renderQuestion();
        }
      });

      mistakeListEl.appendChild(row);
    }
  }

  // =========================
  // 7) 入力
  // =========================
  function onToken(token){
    // 連続（＋－×÷）だけ軽く抑制（学習の邪魔にならない最低限）
    const last = state.tokens[state.tokens.length-1];
    const strictOps = ["＋","－","×","÷"];
    if(strictOps.includes(token) && strictOps.includes(last)){
      setMessage("演算子が連続しています。項目を挟んでください。", "warn");
      return;
    }

    state.tokens.push(token);
    setMessage("");
    hintEl.textContent = "";
    renderExpr();

    // 自動判定：長さが一致した瞬間に採点
    autoJudgeIfReady();
  }

  function clearExpr(render=true){
    state.tokens = [];
    if(render) renderExpr();
  }

  undoBtn.addEventListener("click", () => {
    state.tokens.pop();
    setMessage("");
    hintEl.textContent = "";
    renderExpr();
  });

  clearBtn.addEventListener("click", () => {
    clearExpr(true);
    setMessage("");
    hintEl.textContent = "";
  });

  showAnsBtn.addEventListener("click", () => {
    const q = QUESTIONS[state.idx];
    setMessage("答え（トークン列）を表示しました。", "warn");
    hintEl.textContent = q.tokens.join(" ");
  });

  resetMistakesBtn.addEventListener("click", () => {
    state.mistakeCountByName.clear();
    renderMistakeList();
    setMessage("ミス履歴をリセットしました。", "warn");
  });

  // =========================
  // 8) 自動判定＆次へ
  // =========================
  function arraysEqual(a,b){
    if(a.length !== b.length) return false;
    for(let i=0;i<a.length;i++){
      if(a[i] !== b[i]) return false;
    }
    return true;
  }

  function autoJudgeIfReady(){
    const q = QUESTIONS[state.idx];

    // 連打・多重判定防止
    const now = Date.now();
    if(now - state.lastAutoJudgedAt < 180) return;

    // “式完成”の定義：トークン数が正解トークン数に到達したら判定
    if(state.tokens.length !== q.tokens.length) return;

    state.lastAutoJudgedAt = now;
    state.tries += 1;

    const ok = arraysEqual(state.tokens, q.tokens);
    if(ok){
      state.correct += 1;
      updateScore();
      setMessage("正解！→ 次へ", "good");
      hintEl.textContent = q.hint || "";

      // 正解なら自動で次へ
      setTimeout(() => nextQuestion(), 450);
    }else{
      // 不正解：ミスリスト入り（回数カウント）
      const cur = state.mistakeCountByName.get(q.name) || 0;
      state.mistakeCountByName.set(q.name, cur + 1);
      renderMistakeList();

      updateScore();
      setMessage("不正解。ミス問題リストに追加しました。", "bad");
      hintEl.textContent = "ヒント：分子/分母の“利益の種類（営業/経常/純）”と、“資産の範囲（総資産/流動/当座/固定）”に注目。";
      // 不正解はそのまま（自分でクリアして再挑戦）
    }
  }

  nextBtn.addEventListener("click", () => nextQuestion());

  function pickRandomIndexFrom(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function nextQuestion(){
    const mode = poolEl.value;

    if(mode === "sequential"){
      state.idx = (state.idx + 1) % QUESTIONS.length;
      renderQuestion();
      return;
    }

    if(mode === "mistakes"){
      const names = [...state.mistakeCountByName.keys()];
      if(names.length === 0){
        setMessage("ミス問題がまだありません。全問題に戻してください。", "warn");
        return;
      }
      // ミス回数が多いほど出やすく（重み付け）
      const weighted = [];
      for(const name of names){
        const count = state.mistakeCountByName.get(name) || 1;
        for(let i=0;i<Math.min(8, count);i++) weighted.push(name);
      }
      const pickName = pickRandomIndexFrom(weighted);
      const idx = QUESTIONS.findIndex(q => q.name === pickName);
      if(idx >= 0) state.idx = idx;
      renderQuestion();
      return;
    }

    // all（ランダム）
    state.idx = Math.floor(Math.random() * QUESTIONS.length);
    renderQuestion();
  }

  // =========================
  // 起動
  // =========================
  updateScore();
  renderMistakeList();
  renderQuestion();
})();
</script>
</body>
</html>
